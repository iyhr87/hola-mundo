name: Build LaTeX
on:
  push:
    branches:
      - main

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex  # Change to your filename
          # args: -pdf -file-line-error -interaction=nonstopmode # Optional: custom pdflatex args

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Output
          path: main.pdf
