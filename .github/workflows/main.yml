name: Compile and Push LaTeX
on:
  push:
    branches:
      - main

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso crucial para que el script pueda subir archivos
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: pdflatex

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add main.pdf
          git commit -m "Actualización automática del PDF [skip ci]" || echo "No hay cambios para subir"
          git push
